<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ganty's Project Archive // Matrix v1.0</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      .mono { font-family: 'Fira Code', monospace; }
      
      /* Subtle grid background overlay for the matrix look */
      .matrix-grid {
        background-color: #0c111e;
        background-image: 
          linear-gradient(#1a202c 1px, transparent 1px),
          linear-gradient(90deg, #1a202c 1px, transparent 1px);
        background-size: 20px 20px;
        background-position: center;
      }

      /* Consistent square aspect ratio for tiles */
      .matrix-tile { aspect-ratio: 1 / 1; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="matrix-grid text-[#e2e8f0] min-h-screen relative antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo } = React;

      // -----------------------------------------------------------------
      // DATA CONFIGURATION
      // Adding a new project still works exactly the same way here!
      // -----------------------------------------------------------------
      const projectData = {
        school: {
          name: 'School Projects', icon: '🎓', actionText: 'Open', color: 'yellow',
          items: [
            { title: 'Latin Dictionary WIP', description: 'Latin dictionary for all your latin dictionary needs!', link: 'https://gantyfonta.github.io/LD/' },
            { title: 'Significant Figures Calculator', description: 'Do math with rounding and automatic SF handling.', link: 'https://gantyfonta.github.io/SigFigCalc/' },
            { title: 'Latin AI', description: 'Ask for help to an AI chatbot.', link: 'https://latinusmagister.base44.app/' },
            { title: 'Outlet', description: 'Paste in flashcards or vocab words and study them.', link: 'https://owtlette.base44.app/' },
            { title: 'Things From Grammer', description: 'I purposely misspelled Grammar to ragbait tesco.', link: 'https://gantyfonta.github.io/Grammar/' },
            { title: 'Graphing Calculator', description: 'Works with most graphs.', link: 'https://gantyfonta.github.io/gcalc/' },
          ]
        },
        games: {
          name: 'Random Games', icon: '🎮', actionText: 'Play', color: 'sky',
          items: [
            { title: 'Boxy', description: 'Stack boxes and use poweful tools to make $$$.', link: 'https://gantyfonta.github.io/Boxy/' },
            { title: 'Brawl Star', description: 'Brawl stars dont sue me please.', link: 'https://gantyfonta.github.io/brawl/' },
            { title: 'Untitled Platformer', description: 'The new single greatest speedruning platformer.', link: 'https://gantyfonta.github.io/jump/' },
            { title: 'SprootTop', description: 'Windows 98 Sim on the Sproot.inc Laptop.', link: 'https://gantyfonta.github.io/Sproottop/' },
            { title: 'Cess', description: 'Chess, but too much.', link: 'https://gantyfonta.github.io/cess/' },
            { title: 'Redstone Simulator', description: '2D Minecraft redstone simulation featuring many redstone components.', link: 'https://gantyfonta.github.io/redstone/' },
            { title: 'Polytrack', description: 'Play a drive game made by Kodub.', link: 'https://gantyfonta.github.io/polytrack/' },
            { title: 'Shapemon', description: 'A Pokemon battle style game, but with shapes.', link: 'https://gantyfonta.github.io/Shapemon/' },
            { title: 'Emulator', description: 'Play several games from older consoles.', link: 'https://gantyfonta.github.io/wdbgub/emulator/index.html' },
            { title: 'Numberle', description: 'Play higher or lower in a wordle-ish number guessing game.', link: 'https://gantyfonta.github.io/Numberle/' },
            { title: "Caesar's Spelling Bee", description: 'Spell out the spoken latin words.', link: 'https://gantyfonta.github.io/SpellingBee/' },
            { title: 'Chess', description: 'Play chess against someone online.', link: 'https://gantyfonta.github.io/chess/' },
            { title: 'Stonks', description: 'Pretend you have stocks in an always changing stonks game.', link: 'https://gantyfonta.github.io/Stonks/' },
            { title: 'Forge of Legends', description: 'Make cool weapons, fight stuff. (Zoom out to see full weapons)', link: 'https://forge-of-legends-7e55fd62.base44.app/Forge' },
            { title: 'Gambling', description: 'Two words: Slot Machine.', link: 'https://gantyfonta.github.io/Gambling/' },
            { title: 'The Maze', description: 'Run from a minotaur in a maze.', link: 'https://gantyfonta.github.io/TheMaze/' },
            { title: 'RNG', description: 'A poorly made RNG game.', link: 'https://gantyfonta.github.io/Rng/' },
            { title: 'Poker', description: 'Classic poker.', link: 'https://gantyfonta.github.io/Poker/' },
            { title: 'Blackjack', description: Reach '21 to win.', link: 'https://gantyfonta.github.io/Blackjack/' },
            { title: 'Russian Roulette', description: 'Simple (bad) Russian Roulette.', link: 'https://gantyfonta.github.io/RussianRoulette/' },
            { title: 'Culinary Craft', description: 'Jesse, we need to cook.', link: 'https://culinary-craft-07cb0bc3.base44.app/' },
            { title: 'Chalkboard', description: 'Draw on a chalkboard with people.', link: 'https://gantyfonta.github.io/chalkboard/' },
            { title: 'Multiplayer Checkboxes', description: 'Click checkboxes and see them on other peoples screens.', link: 'https://gantyfonta.github.io/checkboxes/' },
            { title: 'Lightbulb', description: 'To turn on or off lightbulbs.', link: 'https://gantyfonta.github.io/Lightbulb/' },
          ]
        },
        misc: {
          name: 'Miscellaneous', icon: '⚡', actionText: 'Open', color: 'emerald',
          items: [
            { title: 'Conflict Rooms', description: 'A room based meeting site that works like Zoom and looks like Conflict.', link: 'https://gantyfonta.github.io/conflict-chat/' },
            { title: 'Hand Physics Lab', description: 'A hand and face tracking simulation in 3D.', link: 'https://gantyfonta.github.io/HandPhysicsLab/' },
            { title: 'Grak Caveman (newest)', description: 'Chat with Grak, a caveman AI.', link: 'https://preview--aura-chat-copy-255598c1.base44.app/Chat?hide_badge=true' },
            { title: 'Synthesizer', description: 'Make music.', link: 'https://gantyfonta.github.io/synthesizer/' },
            { title: 'Robert the AI', description: 'Talk to the ultimate codemaking British AI.', link: 'https://robert.base44.app' },
            { title: 'GantyMail', description: 'Another email(chat) system to talk to people.', link: 'https://gantyfonta.github.io/gantymail/' },
            { title: 'Blurp', description: 'Create an account, add people and talk to them.', link: 'https://gantyfonta.github.io/blurp/' },
            { title: 'MultiCode Runner', description: 'Run most other websites / code inside of it.', link: 'https://gantyfonta.github.io/Multicoderunner/' },
            { title: 'Grak 2.0', description: 'Grak, but obsessed with space.', link: 'https://gantyfonta.github.io/grak2.0/' },
            { title: 'Grak (oldest)', description: 'The oldest primordial Grak.', link: 'https://gantyfonta.github.io/grak/' },
          ]
        },
        oink: {
          name: "Oink O' Stuff", icon: '🐷', actionText: 'Launch', color: 'rose',
          items: [
            { title: 'Oink-O-Clock Jump', description: 'The single greatest game ever made.', link: 'https://gantyfonta.github.io/oinkoclockjump/' },
            { title: 'OOCJ Battles', description: 'Two players. See whos the best.', link: 'https://gantyfonta.github.io/OOCJBattles/' },
            { title: 'Moinkcraft', description: 'A WIP 2D sandbox game about pigs.', link: 'https://gantyfonta.github.io/OOCJRouge/' },
          ]
        },
        familiar: {
          name: 'Oddly Familiar', icon: '👁️', actionText: 'Visit', color: 'violet',
          items: [
            { title: 'Sprootgle Docs', description: 'A very familiar seeming document program.', link: 'https://sproot-docs.base44.app' },
            { title: 'Sprootify', description: 'A music app for all your music needs.', link: 'https://vibefy.base44.app/' },
            { title: 'Conflict', description: 'A simple messaging app that looks familiar.', link: 'https://gantyfonta.github.io/conflict/' },
          ]
        }
      };

      // Utility function to generate a 2-letter symbol from project title
      // E.g., Latin Dictionary -> Ld, Boxy -> Bo, Grak AI -> Gk
      const generateSymbol = (title) => {
        const words = title.trim().split(' ');
        if (words.length >= 2) {
          return words[0][0].toUpperCase() + words[1][0].toLowerCase();
        } else {
          // If only one word, return first two letters, capitalizing first.
          return words[0][0].toUpperCase() + words[0][1].toLowerCase();
        }
      };

      // -------------------- COMPONENTS --------------------

      const DetailsPanel = ({ project, onClose }) => {
        if (!project) return null;

        const colorMap = {
          yellow: 'border-yellow-500 text-yellow-300',
          sky: 'border-sky-500 text-sky-300',
          emerald: 'border-emerald-500 text-emerald-300',
          rose: 'border-rose-500 text-rose-300',
          violet: 'border-violet-500 text-violet-300',
        };

        const currentStyle = colorMap[project.categoryColor];

        return (
          <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 z-50">
            <div className={`bg-[#1a202c] border-2 ${currentStyle.split(' ')[0]} rounded-2xl w-full max-w-lg p-8 shadow-2xl relative transition-all`}>
              <button onClick={onClose} className="absolute top-4 right-5 text-gray-500 hover:text-white text-3xl font-mono">×</button>
              
              <div className="flex items-center gap-4 mb-6">
                <span className="text-5xl mono font-bold bg-gray-900 px-5 py-3 rounded-xl shadow-inner">{project.symbol}</span>
                <div>
                  <h2 className="text-2xl font-bold text-white tracking-tight">{project.data.title}</h2>
                  <p className={`text-sm ${currentStyle.split(' ')[1]} font-medium`}>{project.categoryName}</p>
                </div>
              </div>
              
              <p className="text-gray-300 mb-8 leading-relaxed text-base">{project.data.description}</p>
              
              <a
                href={project.data.link}
                target="_blank"
                rel="noopener noreferrer"
                className={`w-full text-center py-3.5 rounded-xl bg-gradient-to-r from-${project.categoryColor}-600 to-${project.categoryColor}-500 text-white text-base font-bold shadow-md hover:scale-[1.03] transition-all block tracking-wide`}
              >
                {project.actionText} Project Now →
              </a>
            </div>
          </div>
        );
      };

      // Matrix Tile Component
      const Tile = ({ symbol, title, colorTheme, onClick }) => {
        const themeStyles = {
          yellow: 'border-yellow-900/50 hover:border-yellow-400 bg-yellow-950/20 text-yellow-300 hover:shadow-[0_0_15px_rgba(250,204,21,0.2)] hover:scale-105',
          sky: 'border-sky-900/50 hover:border-sky-400 bg-sky-950/20 text-sky-300 hover:shadow-[0_0_15px_rgba(56,189,248,0.2)] hover:scale-105',
          emerald: 'border-emerald-900/50 hover:border-emerald-400 bg-emerald-950/20 text-emerald-300 hover:shadow-[0_0_15px_rgba(16,185,129,0.2)] hover:scale-105',
          rose: 'border-rose-900/50 hover:border-rose-400 bg-rose-950/20 text-rose-300 hover:shadow-[0_0_15px_rgba(244,63,94,0.2)] hover:scale-105',
          violet: 'border-violet-900/50 hover:border-violet-400 bg-violet-950/20 text-violet-300 hover:shadow-[0_0_15px_rgba(139,92,246,0.2)] hover:scale-105',
        };

        return (
          <button
            onClick={onClick}
            className={`matrix-tile flex flex-col justify-center items-center border border-dashed rounded-lg p-3 text-center transition-all duration-300 relative group overflow-hidden ${themeStyles[colorTheme]}`}
            title={title}
          >
            <span className="mono text-2xl font-bold tracking-tight absolute inset-0 flex items-center justify-center opacity-100 group-hover:opacity-10 transition-opacity">
              {symbol}
            </span>
            <span className="text-xs font-semibold leading-tight text-white line-clamp-2 h-8 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity px-1">
              {title}
            </span>
          </button>
        );
      };

      // -------------------- MAIN APP --------------------
      const App = () => {
        const categories = Object.keys(projectData);
        const [searchQuery, setSearchQuery] = useState('');
        const [selectedProject, setSelectedProject] = useState(null);

        // Pre-process all project data for the matrix grid
        // Memoized for performance, especially with 40+ items
        const processedMatrix = useMemo(() => {
          return categories.flatMap(catKey => {
            const cat = projectData[catKey];
            return cat.items
              .filter(item =>
                !searchQuery ||
                item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                item.description.toLowerCase().includes(searchQuery.toLowerCase())
              )
              .map(item => ({
                id: `${catKey}-${item.title}`,
                categoryKey: catKey,
                categoryColor: cat.color,
                categoryName: cat.name,
                actionText: cat.actionText,
                symbol: generateSymbol(item.title),
                data: item
              }));
          });
        }, [searchQuery]);

        const handleSearchChange = (e) => {
          const value = e.target.value;
          setSearchQuery(value);
          // Original easter eggs preserved
          if (value.toLowerCase() === 'bird') window.location.href = 'bird.html';
          if (value.toLowerCase() === 'jump') window.location.href = 'jump.html';
        };

        return (
          <div className="flex flex-col relative z-10 px-6 py-8">
            
            <header className="mb-12 flex flex-col items-center text-center">
              <h1 className="text-3xl font-bold tracking-tight text-white mb-2">PROJECT ARCHIVE // MATRIX v1.0</h1>
              <p className="text-gray-400 text-sm max-w-xl mb-6 leading-relaxed">
                A data-dense visualization of GantyFonta’s diverse software experiments, organized like the elements.
                Select a visual block to view description.
              </p>
              
              <div className="relative w-full max-w-sm">
                <input
                  type="text"
                  className="w-full pl-6 pr-10 py-3 rounded-full bg-gray-900 border border-gray-700 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-sky-500 transition-all font-mono shadow-inner"
                  placeholder="FILTER MATRIX [INPUT]..."
                  value={searchQuery}
                  onChange={handleSearchChange}
                />
                <span className="absolute inset-y-0 right-4 flex items-center pr-1 text-gray-600">🔍</span>
              </div>
            </header>

            <main className="flex-1 max-w-[1200px] mx-auto w-full mb-16">
              {processedMatrix.length > 0 ? (
                <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-3.5 md:gap-4 auto-rows-min grid-dense">
                  {processedMatrix.map(proj => (
                    <Tile
                      key={proj.id}
                      symbol={proj.symbol}
                      title={proj.data.title}
                      colorTheme={proj.categoryColor}
                      onClick={() => setSelectedProject(proj)}
                    />
                  ))}
                </div>
              ) : (
                <div className="flex flex-col items-center justify-center py-20 text-center border-2 border-dashed border-gray-700 rounded-3xl bg-gray-950/20">
                  <span className="text-5xl mb-5">👾</span>
                  <h3 className="text-xl font-bold text-white">SEARCH ERROR // NO DATA RETURNED</h3>
                  <p className="text-gray-500 mt-2 font-mono text-sm">Target string "{searchQuery}" not found in matrix parameters.</p>
                </div>
              )}
            </main>
            
            <footer className="text-center font-mono text-xs text-gray-700 mt-12 pb-6 border-t border-gray-900 pt-6">
              END TRANSMISSION // GANTYFONTA LABS // Built with React + Tailwind (CDN).
            </footer>

            <DetailsPanel project={selectedProject} onClose={() => setSelectedProject(null)} />
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
