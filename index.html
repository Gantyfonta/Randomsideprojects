<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GantyFonta:~/$</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fira Code is the gold standard for terminal/coding fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Fira Code', monospace; 
        background-color: #050505; /* Deep terminal black */
        color: #39ff14; /* Classic terminal neon green */
      }
      
      /* Terminal Cursor Animation */
      .cursor-blink {
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* CRT Scanline Effect Overlay */
      .scanlines {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
        z-index: 50;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #050505; border-left: 1px solid #1a3311; }
      ::-webkit-scrollbar-thumb { background: #1a3311; }
      ::-webkit-scrollbar-thumb:hover { background: #39ff14; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="antialiased selection:bg-[#39ff14] selection:text-black">
    <div class="scanlines"></div>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // -----------------------------------------------------------------
      // DATA CONFIGURATION (With Blackjack syntax error fixed!)
      // -----------------------------------------------------------------
      const projectData = {
        school: {
          name: 'School Projects', cmd: 'SCHOOL.proj', actionText: 'execute',
          items: [
            { title: 'Latin Dictionary WIP', description: 'Latin dictionary for all your latin dictionary needs!', link: 'https://gantyfonta.github.io/LD/' },
            { title: 'Significant Figures Calculator', description: 'Do math with rounding and automatic SF handling.', link: 'https://gantyfonta.github.io/SigFigCalc/' },
            { title: 'Latin AI', description: 'Ask for help to an AI chatbot.', link: 'https://latinusmagister.base44.app/' },
            { title: 'Outlet', description: 'Paste in flashcards or vocab words and study them.', link: 'https://owtlette.base44.app/' },
            { title: 'Things From Grammer', description: 'I purposely misspelled Grammar to ragbait tesco.', link: 'https://gantyfonta.github.io/Grammar/' },
            { title: 'Graphing Calculator', description: 'Works with most graphs.', link: 'https://gantyfonta.github.io/gcalc/' },
          ]
        },
        games: {
          name: 'Random Games', cmd: 'GAMES.exe', actionText: 'play',
          items: [
            { title: 'Boxy', description: 'Stack boxes and use poweful tools to make $$$.', link: 'https://gantyfonta.github.io/Boxy/' },
            { title: 'Brawl Star', description: 'Brawl stars dont sue me please.', link: 'https://gantyfonta.github.io/brawl/' },
            { title: 'Untitled Platformer', description: 'The new single greatest speedruning platformer.', link: 'https://gantyfonta.github.io/jump/' },
            { title: 'SprootTop', description: 'Windows 98 Sim on the Sproot.inc Laptop.', link: 'https://gantyfonta.github.io/Sproottop/' },
            { title: 'Cess', description: 'Chess, but too much.', link: 'https://gantyfonta.github.io/cess/' },
            { title: 'Redstone Simulator', description: '2D Minecraft redstone simulation featuring many redstone components.', link: 'https://gantyfonta.github.io/redstone/' },
            { title: 'Polytrack', description: 'Play a drive game made by Kodub.', link: 'https://gantyfonta.github.io/polytrack/' },
            { title: 'Shapemon', description: 'A Pokemon battle style game, but with shapes.', link: 'https://gantyfonta.github.io/Shapemon/' },
            { title: 'Emulator', description: 'Play several games from older consoles.', link: 'https://gantyfonta.github.io/wdbgub/emulator/index.html' },
            { title: 'Numberle', description: 'Play higher or lower in a wordle-ish number guessing game.', link: 'https://gantyfonta.github.io/Numberle/' },
            { title: "Caesar's Spelling Bee", description: 'Spell out the spoken latin words.', link: 'https://gantyfonta.github.io/SpellingBee/' },
            { title: 'Chess', description: 'Play chess against someone online.', link: 'https://gantyfonta.github.io/chess/' },
            { title: 'Stonks', description: 'Pretend you have stocks in an always changing stonks game.', link: 'https://gantyfonta.github.io/Stonks/' },
            { title: 'Forge of Legends', description: 'Make cool weapons, fight stuff. (Zoom out to see full weapons)', link: 'https://forge-of-legends-7e55fd62.base44.app/Forge' },
            { title: 'Gambling', description: 'Two words: Slot Machine.', link: 'https://gantyfonta.github.io/Gambling/' },
            { title: 'The Maze', description: 'Run from a minotaur in a maze.', link: 'https://gantyfonta.github.io/TheMaze/' },
            { title: 'RNG', description: 'A poorly made RNG game.', link: 'https://gantyfonta.github.io/Rng/' },
            { title: 'Poker', description: 'Classic poker.', link: 'https://gantyfonta.github.io/Poker/' },
            { title: 'Blackjack', description: 'Reach 21 to win.', link: 'https://gantyfonta.github.io/Blackjack/' },
            { title: 'Russian Roulette', description: 'Simple (bad) Russian Roulette.', link: 'https://gantyfonta.github.io/RussianRoulette/' },
            { title: 'Culinary Craft', description: 'Jesse, we need to cook.', link: 'https://culinary-craft-07cb0bc3.base44.app/' },
            { title: 'Chalkboard', description: 'Draw on a chalkboard with people.', link: 'https://gantyfonta.github.io/chalkboard/' },
            { title: 'Multiplayer Checkboxes', description: 'Click checkboxes and see them on other peoples screens.', link: 'https://gantyfonta.github.io/checkboxes/' },
            { title: 'Lightbulb', description: 'To turn on or off lightbulbs.', link: 'https://gantyfonta.github.io/Lightbulb/' },
          ]
        },
        misc: {
          name: 'Miscellaneous', cmd: 'MISC.opus', actionText: 'init',
          items: [
            { title: 'Conflict Rooms', description: 'A room based meeting site that works like Zoom and looks like Conflict.', link: 'https://gantyfonta.github.io/conflict-chat/' },
            { title: 'Hand Physics Lab', description: 'A hand and face tracking simulation in 3D.', link: 'https://gantyfonta.github.io/HandPhysicsLab/' },
            { title: 'Grak the AI Caveman', description: 'Chat with Grak, a caveman AI.', link: 'https://preview--aura-chat-copy-255598c1.base44.app/Chat?hide_badge=true' },
            { title: 'Synthesizer', description: 'Make music.', link: 'https://gantyfonta.github.io/synthesizer/' },
            { title: 'Robert the AI', description: 'Talk to the ultimate codemaking British AI.', link: 'https://robert.base44.app' },
            { title: 'GantyMail', description: 'Another email(chat) system to talk to people.', link: 'https://gantyfonta.github.io/gantymail/' },
            { title: 'Blurp', description: 'Create an account, add people and talk to them.', link: 'https://gantyfonta.github.io/blurp/' },
            { title: 'MultiCode Runner', description: 'Run most other websites / code inside of it.', link: 'https://gantyfonta.github.io/Multicoderunner/' },
            { title: 'Grak 2.0', description: 'Grak, but obsessed with space.', link: 'https://gantyfonta.github.io/grak2.0/' },
            { title: 'Grak (oldest)', description: 'The oldest primordial Grak.', link: 'https://gantyfonta.github.io/grak/' },
          ]
        },
        oink: {
          name: "Oink O' Stuff", cmd: 'OINK.bin', actionText: 'launch',
          items: [
            { title: 'Oink-O-Clock Jump', description: 'The single greatest game ever made.', link: 'https://gantyfonta.github.io/oinkoclockjump/' },
            { title: 'OOCJ Battles', description: 'Two players. See whos the best.', link: 'https://gantyfonta.github.io/OOCJBattles/' },
            { title: 'Moinkcraft', description: 'A WIP 2D sandbox game about pigs.', link: 'https://gantyfonta.github.io/OOCJRouge/' },
          ]
        },
        familiar: {
          name: 'Oddly Familiar', cmd: 'FAMILIAR.sys', actionText: 'connect',
          items: [
            { title: 'Sprootgle Docs', description: 'A very familiar seeming document program.', link: 'https://sproot-docs.base44.app' },
            { title: 'Sprootify', description: 'A music app for all your music needs.', link: 'https://vibefy.base44.app/' },
            { title: 'Conflict', description: 'A simple messaging app that looks familiar.', link: 'https://gantyfonta.github.io/conflict/' },
          ]
        }
      };

      // -------------------- COMPONENTS --------------------
      
      const PromptPrefix = () => (
        <span className="text-white mr-2">GantyFonta:~/$</span>
      );

      // -------------------- MAIN APP --------------------
      const App = () => {
        const categories = Object.keys(projectData);
        const [activeTab, setActiveTab] = useState(categories[0]);
        const [searchQuery, setSearchQuery] = useState('');
        const [loginTime, setLoginTime] = useState('');

        // Set realistic login time on mount
        useEffect(() => {
          setLoginTime(new Date().toUTCString());
        }, []);

        const handleSearchChange = (e) => {
          const value = e.target.value;
          setSearchQuery(value);
          // Easter eggs preserved
          if (value.toLowerCase() === 'bird') window.location.href = 'bird.html';
          if (value.toLowerCase() === 'jump') window.location.href = 'jump.html';
        };

        const currentCategory = projectData[activeTab];
        const filteredItems = currentCategory.items.filter(item =>
          item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
          item.description.toLowerCase().includes(searchQuery.toLowerCase())
        );

        return (
          <div className="min-h-screen flex flex-col p-4 md:p-8 max-w-5xl mx-auto text-[13px] sm:text-[15px] leading-relaxed">
            
            {/* TERMINAL HEADER */}
            <div className="mb-6 text-[#1a5a14] font-semibold">
              <p>Last login: {loginTime} on console</p>
              <p>GantyOS v2.4.1 (Archive Edition) - type 'help' for support.</p>
            </div>

            {/* DIRECTORY LISTING (Navigation) */}
            <div className="mb-8">
              <div className="flex items-center mb-2">
                <PromptPrefix />
                <span className="text-[#0ff]">ls -la ./categories</span>
              </div>
              <div className="flex flex-wrap gap-x-6 gap-y-3 pl-4">
                {categories.map(key => {
                  const cat = projectData[key];
                  const isActive = activeTab === key;
                  return (
                    <button
                      key={key}
                      onClick={() => { setActiveTab(key); setSearchQuery(''); }}
                      className={`transition-colors text-left group flex items-center ${isActive ? 'text-yellow-400' : 'text-[#39ff14] hover:text-white'}`}
                    >
                      <span className="mr-2 opacity-50 group-hover:opacity-100">drwxr-xr-x</span>
                      <span>[{cat.cmd}]</span>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* COMMAND EXECUTION & OUTPUT */}
            <div className="mb-8 flex-1">
              {/* Command typed */}
              <div className="flex items-center mb-3">
                <PromptPrefix />
                <span className="text-[#0ff]">./run {currentCategory.cmd}</span>
              </div>

              {/* Output Header */}
              <div className="pl-4 border-l border-[#1a3311] ml-2">
                <div className="text-gray-400 mb-4">
                  Loading module '{currentCategory.name}'... OK.<br/>
                  Found {currentCategory.items.length} records.
                </div>

                {/* GREP / SEARCH INPUT */}
                <div className="flex items-center gap-3 mb-6 bg-[#0a1105] p-2 inline-flex border border-[#1a3311]">
                  <span className="text-yellow-400">grep</span>
                  <input
                    type="text"
                    className="bg-transparent border-none outline-none text-white w-48 sm:w-64 placeholder-[#1a3311]"
                    placeholder='"search filter"'
                    value={searchQuery}
                    onChange={handleSearchChange}
                    spellCheck="false"
                  />
                  {searchQuery && <span className="text-gray-500 text-xs">| {filteredItems.length} match(es)</span>}
                </div>

                {/* PROJECTS LIST */}
                <div className="space-y-4">
                  {filteredItems.length > 0 ? (
                    filteredItems.map((item, idx) => (
                      <div key={idx} className="flex flex-col sm:flex-row sm:items-start group">
                        <div className="flex-1 pr-4">
                          <span className="text-gray-500 mr-2">[{String(idx + 1).padStart(2, '0')}]</span>
                          <span className="text-white font-bold">{item.title}</span>
                          <span className="text-gray-400 ml-2 block sm:inline mt-1 sm:mt-0">
                            // {item.description}
                          </span>
                        </div>
                        <a
                          href={item.link}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="mt-2 sm:mt-0 text-[#0ff] opacity-80 hover:opacity-100 hover:text-yellow-400 transition-colors whitespace-nowrap before:content-['>_'] before:mr-1"
                        >
                          {currentCategory.actionText.toUpperCase()}
                        </a>
                      </div>
                    ))
                  ) : (
                    <div className="text-red-500">
                      Error: No files matching "{searchQuery}" in directory ./categories/{currentCategory.cmd}
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* WAITING PROMPT */}
            <div className="flex items-center pb-8 mt-auto">
              <PromptPrefix />
              <span className="w-2.5 h-5 bg-[#39ff14] cursor-blink"></span>
            </div>

          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
