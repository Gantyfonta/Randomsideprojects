<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ganty's Lemonade Stand</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Fredoka', sans-serif; 
        background-color: #FFFDE7; /* Very light sunny yellow */
        color: #4E342E; /* Dark wood brown */
      }
      
      /* The classic stand awning */
      .awning {
        height: 60px;
        background: repeating-linear-gradient(
          to right,
          #FDE047, /* Tailwind yellow-300 */
          #FDE047 60px,
          #FFFFFF 60px,
          #FFFFFF 120px
        );
        box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        border-bottom: 4px solid #EAB308; /* Tailwind yellow-500 */
        position: relative;
      }
      
      /* Scalloped edge effect for the awning */
      .awning::after {
        content: "";
        position: absolute;
        bottom: -15px;
        left: 0;
        right: 0;
        height: 15px;
        background-image: radial-gradient(circle at 30px 0, transparent 30px, #FFFDE7 31px);
        background-size: 60px 15px;
        background-position: 0 0;
      }

      /* Chalkboard menu styling */
      .chalkboard {
        background-color: #2E4C3D; /* Deep chalkboard green */
        color: #F8FAFC;
        border: 12px solid #8B5A2B; /* Wood frame */
        border-radius: 8px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.1);
      }

      /* Smooth scrolling */
      html { scroll-behavior: smooth; }
      
      /* Custom scrollbar to match the theme */
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #FFFDE7; }
      ::-webkit-scrollbar-thumb { background: #FDE047; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #EAB308; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="antialiased selection:bg-yellow-300 selection:text-amber-900 min-h-screen flex flex-col">
    <div class="awning w-full z-50 fixed top-0 left-0"></div>
    
    <div id="root" class="pt-20 flex-1"></div>

    <script type="text/babel">
      const { useState } = React;

      // -----------------------------------------------------------------
      // DATA CONFIGURATION
      // -----------------------------------------------------------------
      const projectData = {
        school: {
          name: 'Brain Juice', icon: '🧠', actionText: 'Drink Up',
          items: [
            { title: 'Latin Dictionary WIP', description: 'Latin dictionary for all your latin dictionary needs!', link: 'https://gantyfonta.github.io/LD/' },
            { title: 'Significant Figures Calculator', description: 'Do math with rounding and automatic SF handling.', link: 'https://gantyfonta.github.io/SigFigCalc/' },
            { title: 'Latin AI', description: 'Ask for help to an AI chatbot.', link: 'https://latinusmagister.base44.app/' },
            { title: 'Outlet', description: 'Paste in flashcards or vocab words and study them.', link: 'https://owtlette.base44.app/' },
            { title: 'Things From Grammer', description: 'I purposely misspelled Grammar to ragbait tesco.', link: 'https://gantyfonta.github.io/Grammar/' },
            { title: 'Graphing Calculator', description: 'Works with most graphs.', link: 'https://gantyfonta.github.io/gcalc/' },
          ]
        },
        games: {
          name: 'Game Punch', icon: '🕹️', actionText: 'Play',
          items: [
            { title: 'Boxy', description: 'Stack boxes and use poweful tools to make $$$.', link: 'https://gantyfonta.github.io/Boxy/' },
            { title: 'Brawl Star', description: 'Brawl stars dont sue me please.', link: 'https://gantyfonta.github.io/brawl/' },
            { title: 'Untitled Platformer', description: 'The new single greatest speedruning platformer.', link: 'https://gantyfonta.github.io/jump/' },
            { title: 'SprootTop', description: 'Windows 98 Sim on the Sproot.inc Laptop.', link: 'https://gantyfonta.github.io/Sproottop/' },
            { title: 'Cess', description: 'Chess, but too much.', link: 'https://gantyfonta.github.io/cess/' },
            { title: 'Redstone Simulator', description: '2D Minecraft redstone simulation featuring many redstone components.', link: 'https://gantyfonta.github.io/redstone/' },
            { title: 'Polytrack', description: 'Play a drive game made by Kodub.', link: 'https://gantyfonta.github.io/polytrack/' },
            { title: 'Shapemon', description: 'A Pokemon battle style game, but with shapes.', link: 'https://gantyfonta.github.io/Shapemon/' },
            { title: 'Emulator', description: 'Play several games from older consoles.', link: 'https://gantyfonta.github.io/wdbgub/emulator/index.html' },
            { title: 'Numberle', description: 'Play higher or lower in a wordle-ish number guessing game.', link: 'https://gantyfonta.github.io/Numberle/' },
            { title: "Caesar's Spelling Bee", description: 'Spell out the spoken latin words.', link: 'https://gantyfonta.github.io/SpellingBee/' },
            { title: 'Chess', description: 'Play chess against someone online.', link: 'https://gantyfonta.github.io/chess/' },
            { title: 'Stonks', description: 'Pretend you have stocks in an always changing stonks game.', link: 'https://gantyfonta.github.io/Stonks/' },
            { title: 'Forge of Legends', description: 'Make cool weapons, fight stuff. (Zoom out to see full weapons)', link: 'https://forge-of-legends-7e55fd62.base44.app/Forge' },
            { title: 'Gambling', description: 'Two words: Slot Machine.', link: 'https://gantyfonta.github.io/Gambling/' },
            { title: 'The Maze', description: 'Run from a minotaur in a maze.', link: 'https://gantyfonta.github.io/TheMaze/' },
            { title: 'RNG', description: 'A poorly made RNG game.', link: 'https://gantyfonta.github.io/Rng/' },
            { title: 'Poker', description: 'Classic poker.', link: 'https://gantyfonta.github.io/Poker/' },
            { title: 'Blackjack', description: 'Reach 21 to win.', link: 'https://gantyfonta.github.io/Blackjack/' },
            { title: 'Russian Roulette', description: 'Simple (bad) Russian Roulette.', link: 'https://gantyfonta.github.io/RussianRoulette/' },
            { title: 'Culinary Craft', description: 'Jesse, we need to cook.', link: 'https://culinary-craft-07cb0bc3.base44.app/' },
            { title: 'Chalkboard', description: 'Draw on a chalkboard with people.', link: 'https://gantyfonta.github.io/chalkboard/' },
            { title: 'Multiplayer Checkboxes', description: 'Click checkboxes and see them on other peoples screens.', link: 'https://gantyfonta.github.io/checkboxes/' },
            { title: 'Lightbulb', description: 'To turn on or off lightbulbs.', link: 'https://gantyfonta.github.io/Lightbulb/' },
          ]
        },
        misc: {
          name: 'Mystery Mix', icon: '🌀', actionText: 'Explore',
          items: [
            { title: 'Conflict Rooms', description: 'A room based meeting site that works like Zoom and looks like Conflict.', link: 'https://gantyfonta.github.io/conflict-chat/' },
            { title: 'Hand Physics Lab', description: 'A hand and face tracking simulation in 3D.', link: 'https://gantyfonta.github.io/HandPhysicsLab/' },
            { title: 'Grak the AI Caveman', description: 'Chat with Grak, a caveman AI.', link: 'https://preview--aura-chat-copy-255598c1.base44.app/Chat?hide_badge=true' },
            { title: 'Synthesizer', description: 'Make music.', link: 'https://gantyfonta.github.io/synthesizer/' },
            { title: 'Robert the AI', description: 'Talk to the ultimate codemaking British AI.', link: 'https://robert.base44.app' },
            { title: 'GantyMail', description: 'Another email(chat) system to talk to people.', link: 'https://gantyfonta.github.io/gantymail/' },
            { title: 'Blurp', description: 'Create an account, add people and talk to them.', link: 'https://gantyfonta.github.io/blurp/' },
            { title: 'MultiCode Runner', description: 'Run most other websites / code inside of it.', link: 'https://gantyfonta.github.io/Multicoderunner/' },
            { title: 'Grak 2.0', description: 'Grak, but obsessed with space.', link: 'https://gantyfonta.github.io/grak2.0/' },
            { title: 'Grak (oldest)', description: 'The oldest primordial Grak.', link: 'https://gantyfonta.github.io/grak/' },
          ]
        },
        oink: {
          name: "Oink O' Stuff", icon: '🐷', actionText: 'Launch',
          items: [
            { title: 'Oink-O-Clock Jump', description: 'The single greatest game ever made.', link: 'https://gantyfonta.github.io/oinkoclockjump/' },
            { title: 'OOCJ Battles', description: 'Two players. See whos the best.', link: 'https://gantyfonta.github.io/OOCJBattles/' },
            { title: 'Moinkcraft', description: 'A WIP 2D sandbox game about pigs.', link: 'https://gantyfonta.github.io/OOCJRouge/' },
          ]
        },
        familiar: {
          name: 'Oddly Familiar', icon: '👁️', actionText: 'Visit',
          items: [
            { title: 'Sprootgle Docs', description: 'A very familiar seeming document program.', link: 'https://sproot-docs.base44.app' },
            { title: 'Sprootify', description: 'A music app for all your music needs.', link: 'https://vibefy.base44.app/' },
            { title: 'Conflict', description: 'A simple messaging app that looks familiar.', link: 'https://gantyfonta.github.io/conflict/' },
          ]
        }
      };

      // -------------------- COMPONENTS --------------------

      // The individual project card (looks like a cute sticker/sign)
      const MenuCard = ({ data, buttonText, icon }) => (
        <a 
          href={data.link}
          target="_blank"
          rel="noopener noreferrer"
          className="group block bg-white rounded-3xl p-6 border-4 border-amber-900/10 hover:border-yellow-400 hover:shadow-[0_8px_0_rgba(250,204,21,1)] hover:-translate-y-2 transition-all duration-200 relative overflow-hidden"
        >
          {/* Decorative Lemon Wedge Corner */}
          <div className="absolute -top-6 -right-6 w-20 h-20 bg-yellow-300 rounded-full opacity-20 group-hover:scale-150 transition-transform duration-500"></div>

          <div className="flex justify-between items-start mb-3 relative z-10">
            <h3 className="text-xl font-bold text-amber-900 group-hover:text-yellow-600 transition-colors leading-tight pr-2">
              {data.title}
            </h3>
            <span className="text-2xl drop-shadow-sm">{icon}</span>
          </div>
          <p className="text-base text-amber-900/70 leading-relaxed mb-6 h-12 line-clamp-2 relative z-10 font-medium">
            {data.description}
          </p>
          <div className="flex items-center text-lg font-bold text-yellow-600 relative z-10">
            {buttonText} 
            <span className="ml-2 transform group-hover:translate-x-1 transition-transform">→</span>
          </div>
        </a>
      );

      // -------------------- MAIN APP --------------------
      const App = () => {
        const categories = Object.keys(projectData);
        const [activeTab, setActiveTab] = useState(categories[0]);
        const [searchQuery, setSearchQuery] = useState('');

        const handleSearchChange = (e) => {
          const value = e.target.value;
          setSearchQuery(value);
          if (value.toLowerCase() === 'bird') window.location.href = 'bird.html';
          if (value.toLowerCase() === 'jump') window.location.href = 'jump.html';
        };

        const currentCategory = projectData[activeTab];
        const filteredItems = currentCategory.items.filter(item =>
          item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
          item.description.toLowerCase().includes(searchQuery.toLowerCase())
        );

        return (
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col items-center">
            
            {/* HERO / SIGN SECTION */}
            <div className="text-center mb-12 relative">
              <div className="inline-block relative">
                {/* Wood posts holding the sign */}
                <div className="absolute -top-12 left-8 w-4 h-20 bg-amber-800 rounded-t-sm -z-10"></div>
                <div className="absolute -top-12 right-8 w-4 h-20 bg-amber-800 rounded-t-sm -z-10"></div>
                
                {/* The main sign */}
                <div className="bg-yellow-400 border-8 border-amber-800 rounded-2xl px-10 py-6 shadow-xl transform -rotate-2">
                  <h1 className="text-5xl md:text-6xl font-bold text-amber-900 drop-shadow-md">
                    Ganty's Stand 🍋
                  </h1>
                  <p className="text-xl text-amber-800 mt-2 font-semibold">Ice cold code & fresh projects.</p>
                </div>
              </div>
            </div>

            {/* CHALKBOARD MENU & SEARCH */}
            <div className="w-full max-w-4xl chalkboard p-8 mb-12 flex flex-col md:flex-row items-center justify-between gap-6">
              
              {/* Flavor Selector (Tabs) */}
              <div className="flex flex-wrap justify-center gap-3 w-full md:w-auto">
                <span className="w-full text-center md:text-left text-yellow-300 font-bold text-xl mb-1 tracking-wide" style={{fontFamily: "'Comic Sans MS', cursive, sans-serif"}}>
                  Pick a Flavor:
                </span>
                {categories.map(key => {
                  const cat = projectData[key];
                  const isActive = activeTab === key;
                  return (
                    <button
                      key={key}
                      onClick={() => { setActiveTab(key); setSearchQuery(''); }}
                      className={`px-4 py-2 rounded-xl text-lg font-bold transition-all ${
                        isActive
                          ? 'bg-yellow-400 text-amber-900 transform scale-105 shadow-md'
                          : 'bg-white/10 text-white hover:bg-white/20'
                      }`}
                    >
                      {cat.icon} {cat.name}
                    </button>
                  );
                })}
              </div>

              {/* Search Box (Tip Jar) */}
              <div className="w-full md:w-72 relative">
                <span className="block text-yellow-300 font-bold text-xl mb-2 tracking-wide" style={{fontFamily: "'Comic Sans MS', cursive, sans-serif"}}>
                  Search:
                </span>
                <input
                  type="text"
                  className="w-full bg-white/10 border-2 border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:outline-none focus:border-yellow-400 focus:bg-white/20 transition-all font-medium text-lg"
                  placeholder="Find a drink..."
                  value={searchQuery}
                  onChange={handleSearchChange}
                />
              </div>
            </div>

            {/* DRINK SAMPLES (PROJECT GRID) */}
            <main className="w-full max-w-6xl">
              {filteredItems.length > 0 ? (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                  {filteredItems.map((project, idx) => (
                    <MenuCard 
                      key={idx} 
                      data={project} 
                      buttonText={currentCategory.actionText} 
                      icon={currentCategory.icon}
                    />
                  ))}
                </div>
              ) : (
                <div className="py-20 text-center bg-white/50 rounded-3xl border-4 border-dashed border-amber-900/20 max-w-2xl mx-auto">
                  <div className="text-6xl mb-4 grayscale opacity-50">🍋</div>
                  <h3 className="text-2xl font-bold text-amber-900 mb-2">We're all out!</h3>
                  <p className="text-lg text-amber-800/70">No projects match "{searchQuery}". Try another flavor.</p>
                </div>
              )}
            </main>

            {/* WOODEN FOOTER */}
            <footer className="mt-20 w-full text-center border-t-4 border-amber-900/10 pt-8 pb-4">
              <p className="text-amber-800/60 font-bold">© 2026 GantyFonta. All lemons squeezed locally.</p>
            </footer>

          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
